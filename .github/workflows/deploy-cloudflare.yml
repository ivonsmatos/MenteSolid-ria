name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
  NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  CALCOM_API_KEY: ${{ secrets.CALCOM_API_KEY }}
  CALCOM_BASE_URL: ${{ secrets.CALCOM_BASE_URL }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  WHATSAPP_API_URL: ${{ secrets.WHATSAPP_API_URL }}
  WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
  NEXT_PUBLIC_MEDPLUM_BASE_URL: ${{ secrets.NEXT_PUBLIC_MEDPLUM_BASE_URL }}
  MEDPLUM_CLIENT_ID: ${{ secrets.MEDPLUM_CLIENT_ID }}
  MEDPLUM_CLIENT_SECRET: ${{ secrets.MEDPLUM_CLIENT_SECRET }}
  USE_SUPABASE: "true"
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Executar testes
        run: npm run test -- --run

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Build Cloudflare Pages
        run: npm run pages:build

      - name: Publicar artefato estático
        uses: actions/upload-artifact@v4
        with:
          name: cf-pages-output
          path: .vercel/output/static

  deploy-preview:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Download artefato estático
        uses: actions/download-artifact@v4.1.3
        with:
          name: cf-pages-output
          path: .vercel/output/static

      - name: Deploy preview no Cloudflare Pages
        run: wrangler pages deploy .vercel/output/static --project-name mentesolidaria --branch pr-${{ github.event.number }}

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Download artefato estático
        uses: actions/download-artifact@v4.1.3
        with:
          name: cf-pages-output
          path: .vercel/output/static

      - name: Deploy produção no Cloudflare Pages
        run: wrangler pages deploy .vercel/output/static --project-name mentesolidaria
